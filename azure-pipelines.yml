trigger:
- main

pool:
  name: Default
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world! MDR
  displayName: 'Run a one-line script'

- task: Docker@2
  inputs:
    containerRegistry: 'docker'
    repository: 'mdrchemitex/TransactionCertificatePorta'
    command: 'buildAndPush'
    Dockerfile: 'services/Service01/Dockerfile'
